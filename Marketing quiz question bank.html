<style>
  :root{
    --bg1:#eef4ff; --bg2:#f7f0ff; --bg3:#eafff4;
    --card:#ffffff; --ink:#2b2d42; --muted:#7a7f9a;
    --brand:#6c8cff; --brand2:#9b6cff;
    --yellow:#ffd56b; --yellow-d:#f4b42b;
    --green:#37c98a; --green-bg:#e4fbf0;
    --red:#ff6b81; --red-bg:#ffe9ee;
    --pill:#f1f4fb; --pill-line:#e3e8f5;
    --shadow:0 18px 40px -18px rgba(80,90,160,.45);
    --radius:22px;
  }
  html[data-theme="dark"]{
    --bg1:#1b1d2b; --bg2:#221c33; --bg3:#16252a;
    --card:#262a3d; --ink:#eef0ff; --muted:#9aa0c0;
    --pill:#2e3350; --pill-line:#3a4060;
    --green-bg:#1e3a31; --red-bg:#3a2230;
    --shadow:0 18px 40px -18px rgba(0,0,0,.6);
  }
  *{box-sizing:border-box}
  body{
    margin:0; font-family:'Nunito',system-ui,sans-serif; color:var(--ink);
    background:linear-gradient(135deg,var(--bg1),var(--bg2) 45%,var(--bg3));
    background-attachment:fixed; min-height:100vh; transition:background .5s,color .3s;
  }
  .wrap{max-width:760px;margin:0 auto;padding:26px 18px 90px}

  header.hero{text-align:center; padding:14px 0 6px}
  .badge{
    display:inline-block; background:var(--yellow); color:#5a3d00;
    font-family:'Baloo 2'; font-weight:700; padding:6px 16px; border-radius:999px;
    box-shadow:0 6px 0 var(--yellow-d); letter-spacing:.3px; animation:pop .6s ease;
  }
  h1{
    font-family:'Baloo 2'; font-size:clamp(28px,6vw,44px); margin:14px 0 4px;
    background:linear-gradient(90deg,var(--brand),var(--brand2));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .sub{color:var(--muted); font-weight:600; margin:0 0 8px}
  .toolbar{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:14px 0 4px}
  .btn{
    border:none; cursor:pointer; font-family:'Nunito'; font-weight:800; font-size:14px;
    padding:9px 16px; border-radius:999px; background:var(--card); color:var(--ink);
    box-shadow:var(--shadow); transition:transform .15s, background .3s;
  }
  .btn:hover{transform:translateY(-2px)}
  .btn.ghost{background:transparent;box-shadow:none;border:2px solid var(--pill-line)}
  .btn.primary{background:linear-gradient(120deg,var(--brand),var(--brand2));color:#fff}
  .btn.big{font-size:16px;padding:13px 26px}
  .btn:disabled{opacity:.45;cursor:not-allowed;transform:none}

  .tabs{display:flex; gap:10px; overflow-x:auto; padding:14px 4px; margin-top:6px; scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{
    flex:0 0 auto; cursor:pointer; border:none; font-family:'Baloo 2'; font-weight:600;
    padding:12px 18px; border-radius:16px; background:var(--card); color:var(--ink);
    box-shadow:var(--shadow); transition:transform .18s, background .3s; white-space:nowrap;
    display:flex; flex-direction:column; align-items:flex-start; gap:2px; min-width:118px;
  }
  .tab small{font-family:'Nunito';font-weight:700;color:var(--muted);font-size:11px}
  .tab.active{background:linear-gradient(120deg,var(--brand),var(--brand2));color:#fff}
  .tab.active small{color:#eaf0ff}
  .tab:hover{transform:translateY(-3px)}

  .chap-head{display:flex;align-items:center;justify-content:space-between;gap:14px;margin:18px 4px 8px;flex-wrap:wrap}
  .chap-head h2{font-family:'Baloo 2';margin:0;font-size:22px}
  .chap-head p{margin:2px 0 0;color:var(--muted);font-weight:700;font-size:14px}
  .score-chip{background:var(--card);border-radius:16px;padding:10px 16px;box-shadow:var(--shadow);font-weight:800;font-family:'Baloo 2';min-width:110px;text-align:center}
  .score-chip span{color:var(--brand)}
  .progress{height:12px;background:var(--pill);border-radius:999px;overflow:hidden;margin:6px 4px 8px;box-shadow:inset 0 1px 3px rgba(0,0,0,.08)}
  .progress > i{display:block;height:100%;width:0;border-radius:999px;background:linear-gradient(90deg,var(--green),#5ad6a0);transition:width .5s cubic-bezier(.2,.8,.2,1)}
  .counter{text-align:right;color:var(--muted);font-weight:800;font-size:13px;margin:0 6px 16px}

  .q{
    background:var(--card); border-radius:var(--radius); padding:24px 22px 20px; margin:0 0 18px;
    box-shadow:var(--shadow); animation:rise .45s ease both;
  }
  .q .qtop{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .qnum{flex:0 0 auto;width:34px;height:34px;border-radius:12px;display:grid;place-items:center;font-family:'Baloo 2';font-weight:700;color:#fff;background:linear-gradient(135deg,var(--brand),var(--brand2))}
  .qtype{font-size:11px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);background:var(--pill);padding:4px 9px;border-radius:999px}
  .qtext{font-size:18px;font-weight:700;line-height:1.45;margin:2px 0 18px}

  .opts{display:flex;flex-direction:column;gap:10px}
  .opt{
    display:flex;align-items:center;gap:12px;text-align:left;cursor:pointer;
    background:var(--pill);border:2px solid var(--pill-line);border-radius:14px;
    padding:13px 14px;font-family:'Nunito';font-weight:700;font-size:15px;color:var(--ink);
    transition:transform .12s, border-color .2s, background .2s;
  }
  .opt:hover:not(.locked){transform:translateX(4px);border-color:var(--brand)}
  .opt .key{flex:0 0 auto;width:30px;height:30px;border-radius:50%;display:grid;place-items:center;background:#1c2034;color:var(--brand);font-family:'Baloo 2';font-weight:700;border:2px solid var(--pill-line)}
  html[data-theme="light"] .opt .key{background:#fff}
  .opt .mark{margin-left:auto;font-weight:900;font-size:18px;opacity:0;transition:opacity .25s}
  .opt.correct{background:var(--green-bg);border-color:var(--green);color:var(--green)}
  .opt.correct .key{background:var(--green);color:#fff;border-color:var(--green)}
  .opt.correct .mark{opacity:1}
  .opt.wrong{background:var(--red-bg);border-color:var(--red);color:var(--red)}
  .opt.wrong .key{background:var(--red);color:#fff;border-color:var(--red)}
  .opt.wrong .mark{opacity:1}
  .opt.locked{cursor:default}
  .opt.dim{opacity:.5}

  .feedback{margin-top:16px;font-weight:800;font-size:14px;border-radius:12px;padding:10px 14px;display:none;animation:rise .35s both}
  .feedback.ok{display:block;background:var(--green-bg);color:var(--green)}
  .feedback.no{display:block;background:var(--red-bg);color:var(--red)}

  .navrow{display:flex;justify-content:space-between;align-items:center;margin-top:6px;gap:10px}

  .done{text-align:center;background:var(--card);border-radius:var(--radius);padding:30px 24px;box-shadow:var(--shadow);margin-top:10px;display:none;animation:pop .5s ease}
  .done.show{display:block}
  .done h3{font-family:'Baloo 2';font-size:26px;margin:6px 0}
  .done .big{font-size:50px;font-family:'Baloo 2';color:var(--brand)}
  .done .wrongnote{color:var(--muted);font-weight:700;margin:10px 0 20px}
  .done .actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}

  footer{text-align:center;color:var(--muted);font-weight:700;font-size:13px;margin-top:30px}
  .confetti{position:fixed;top:-10px;width:10px;height:14px;opacity:.9;z-index:50;border-radius:2px;animation:fall linear forwards}

  @keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  @keyframes pop{0%{transform:scale(.85);opacity:0}100%{transform:scale(1);opacity:1}}
  @keyframes fall{to{transform:translateY(105vh) rotate(720deg);opacity:0}}
  @media (max-width:520px){.qtext{font-size:16px}.opt{font-size:14px}}
</style>
</head>

const tabsEl=document.getElementById('tabs');
const quizEl=document.getElementById('quiz');
const chTitle=document.getElementById('chTitle');
const chSub=document.getElementById('chSub');
const scoreEl=document.getElementById('score');
const totalEl=document.getElementById('total');
const barEl=document.getElementById('bar');
const counterEl=document.getElementById('counter');
const doneEl=document.getElementById('done');
const KEYS=['A','B','C','D','E'];
let current=0;
const state={};

chapters.forEach((c,i)=>{
  state[c.id]={answers:{},correct:0,pos:0};
  const b=document.createElement('button');
  b.className='tab'+(i===0?' active':'');
  b.innerHTML=`${c.title}<small>${c.questions.length} questions</small>`;
  b.onclick=()=>selectChapter(i);
  tabsEl.appendChild(b);
});

function selectChapter(i){
  current=i;
  [...tabsEl.children].forEach((t,idx)=>t.classList.toggle('active',idx===i));
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function render(){
  const c=chapters[current];
  chTitle.textContent=`${c.title}`;
  chSub.textContent=c.subtitle;
  totalEl.textContent=c.questions.length;
  doneEl.classList.remove('show');
  showQuestion();
}

function showQuestion(){
  const c=chapters[current];
  const st=state[c.id];
  const pos=st.pos;
  scoreEl.textContent=st.correct;
  barEl.style.width=Math.round((pos)/c.questions.length*100)+'%';

  if(pos>=c.questions.length){ finish(); return; }
  counterEl.textContent=`Question ${pos+1} of ${c.questions.length}`;
  barEl.style.width=Math.round((Object.keys(st.answers).length)/c.questions.length*100)+'%';

  const q=c.questions[pos];
  const answered=st.answers.hasOwnProperty(pos);
  const chosen=st.answers[pos];

  quizEl.innerHTML='';
  const card=document.createElement('section');
  card.className='q';
  card.innerHTML=`
    <div class="qtop">
      <div class="qnum">${pos+1}</div>
      <span class="qtype">${q.t==='Q'?'True / False':'Multiple Choice'}</span>
    </div>
    <div class="qtext">${q.q}</div>
    <div class="opts"></div>
    <div class="feedback"></div>
    <div class="navrow">
      <button class="btn ghost" id="prevBtn" ${pos===0?'disabled':''}>← Previous</button>
      <button class="btn primary" id="nextBtn" ${answered?'':'disabled'}>${pos===c.questions.length-1?'Finish ✓':'Next →'}</button>
    </div>`;
  const opts=card.querySelector('.opts');
  const fb=card.querySelector('.feedback');

  q.o.forEach((opt,oi)=>{
    const btn=document.createElement('button');
    btn.className='opt';
    btn.innerHTML=`<span class="key">${KEYS[oi]}</span><span>${opt}</span><span class="mark"></span>`;
    btn.onclick=()=>choose(oi);
    opts.appendChild(btn);
  });
  quizEl.appendChild(card);

  if(answered) paintAnswered(opts,fb,q,chosen);

  card.querySelector('#nextBtn').onclick=()=>{ st.pos++; showQuestion(); window.scrollTo({top:0,behavior:'smooth'}); };
  card.querySelector('#prevBtn').onclick=()=>{ if(st.pos>0){st.pos--; showQuestion(); window.scrollTo({top:0,behavior:'smooth'});} };

  function choose(oi){
    if(st.answers.hasOwnProperty(pos)) return;
    st.answers[pos]=oi;
    if(oi===q.a) st.correct++;
    paintAnswered(opts,fb,q,oi);
    card.querySelector('#nextBtn').disabled=false;
    scoreEl.textContent=st.correct;
    barEl.style.width=Math.round(Object.keys(st.answers).length/c.questions.length*100)+'%';
  }
}

function paintAnswered(opts,fb,q,chosen){
  [...opts.children].forEach((b,idx)=>{
    b.classList.add('locked');
    const mk=b.querySelector('.mark');
    if(idx===q.a){b.classList.add('correct');mk.textContent='✓';}
    else b.classList.add('dim');
    if(idx===chosen && chosen!==q.a){b.classList.remove('dim');b.classList.add('wrong');b.querySelector('.mark').textContent='✗';}
  });
  if(chosen===q.a){fb.className='feedback ok';fb.textContent='✅ Correct! Nice work.';}
  else{fb.className='feedback no';fb.textContent='❌ Not quite — the correct answer is highlighted above.';}
}

function getWrong(c){
  const st=state[c.id];
  const wrong=[];
  c.questions.forEach((q,qi)=>{
    const ch=st.answers[qi];
    if(ch!==undefined && ch!==q.a){
      wrong.push({n:qi+1,q:q.q,your:q.o[ch],correct:q.o[q.a]});
    }
  });
  return wrong;
}

function finish(){
  const c=chapters[current];
  const st=state[c.id];
  quizEl.innerHTML='';
  counterEl.textContent='Completed';
  barEl.style.width='100%';
  const total=c.questions.length;
  const pct=Math.round(st.correct/total*100);
  const wrong=getWrong(c);

  doneEl.classList.add('show');
  document.getElementById('doneScore').textContent=`${st.correct}/${total}`;
  let msg;
  if(pct===100) msg='Perfect score! 🏆';
  else if(pct>=80) msg='Great job! 🎉';
  else if(pct>=50) msg='Good effort — review the misses 💪';
  else msg='Keep practicing 📖';
  document.getElementById('doneMsg').textContent=`${msg}  (${pct}%)`;
  const wn=document.getElementById('wrongNote');
  const dl=document.getElementById('dlBtn');
  if(wrong.length===0){
    wn.textContent='No wrong answers — nothing to download. 🌟';
    dl.disabled=true;
  } else {
    wn.textContent=`You missed ${wrong.length} question${wrong.length>1?'s':''}. Download them to review.`;
    dl.disabled=false;
  }
  dl.onclick=()=>downloadWrongPDF(c,wrong,pct);
  document.getElementById('retryBtn').onclick=()=>{ state[c.id]={answers:{},correct:0,pos:0}; render(); window.scrollTo({top:0,behavior:'smooth'}); };
  if(pct>=80) confetti();
}

function downloadWrongPDF(c,wrong,pct){
  if(!(window.jspdf && window.jspdf.jsPDF)){ printFallback(c,wrong,pct); return; }
  const { jsPDF }=window.jspdf;
  const doc=new jsPDF({unit:'pt',format:'a4'});
  const M=48, W=595-M*2; let y=60;

  doc.setFont('helvetica','bold'); doc.setFontSize(20); doc.setTextColor(40,40,70);
  doc.text('Wrong Answers — Review Sheet', M, y); y+=24;
  doc.setFont('helvetica','normal'); doc.setFontSize(11); doc.setTextColor(110,110,140);
  doc.text(`${c.title}: ${c.subtitle}`, M, y); y+=16;
  doc.text(`Score: ${pct}%   |   Missed: ${wrong.length}   |   Date: ${new Date().toLocaleString()}`, M, y); y+=14;
  doc.setDrawColor(220,220,235); doc.line(M,y,595-M,y); y+=24;

  wrong.forEach((w)=>{
    const qLines=doc.splitTextToSize(`Q${w.n}. ${w.q}`, W);
    const yourLines=doc.splitTextToSize(`Your answer: ${w.your}`, W-12);
    const corrLines=doc.splitTextToSize(`Correct answer: ${w.correct}`, W-12);
    const blockH=qLines.length*15 + yourLines.length*14 + corrLines.length*14 + 30;
    if(y+blockH>800){ doc.addPage(); y=60; }

    doc.setFont('helvetica','bold'); doc.setFontSize(11.5); doc.setTextColor(40,40,70);
    doc.text(qLines, M, y); y+=qLines.length*15+4;
    doc.setFont('helvetica','normal'); doc.setFontSize(10.5); doc.setTextColor(200,60,80);
    doc.text(yourLines, M+12, y); y+=yourLines.length*14+2;
    doc.setTextColor(30,150,100);
    doc.text(corrLines, M+12, y); y+=corrLines.length*14+16;
  });

  doc.save(`${c.title.replace(/\s+/g,'_')}_wrong_answers.pdf`);
}

function printFallback(c,wrong,pct){
  const win=window.open('','_blank');
  const rows=wrong.map(w=>`<div style="margin:0 0 16px"><p style="font-weight:700;color:#2b2d42">Q${w.n}. ${w.q}</p>
    <p style="color:#c0294f;margin:4px 0 0 12px">Your answer: ${w.your}</p>
    <p style="color:#1e966a;margin:2px 0 0 12px">Correct answer: ${w.correct}</p></div>`).join('');
  win.document.write(`<html><head><title>${c.title} — Wrong Answers</title></head>
    <body style="font-family:Arial,sans-serif;padding:40px;max-width:760px;margin:auto">
    <h1 style="color:#33365a">Wrong Answers — Review Sheet</h1>
    <p style="color:#666">${c.title}: ${c.subtitle} · Score ${pct}% · Missed ${wrong.length}</p><hr>${rows}
    <script>window.onload=()=>window.print()<\/script></body></html>`);
  win.document.close();
}

function confetti(){
  const colors=['#6c8cff','#9b6cff','#ffd56b','#37c98a','#ff6b81'];
  for(let i=0;i<70;i++){
    const c=document.createElement('div');
    c.className='confetti';
    c.style.left=Math.random()*100+'vw';
    c.style.background=colors[i%colors.length];
    c.style.animationDuration=(2+Math.random()*2)+'s';
    c.style.animationDelay=(Math.random()*0.6)+'s';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),4200);
  }
}

document.getElementById('resetBtn').onclick=()=>{ state[chapters[current].id]={answers:{},correct:0,pos:0}; render(); };
const themeBtn=document.getElementById('themeBtn');
themeBtn.onclick=()=>{
  const dark=document.documentElement.getAttribute('data-theme')==='dark';
  document.documentElement.setAttribute('data-theme',dark?'light':'dark');
  themeBtn.textContent=dark?'🌙 Comfort Dark':'☀️ Light Mode';
};

render();
</script>
